version: '3.8'

services:
  postgresql:
    image: postgres:16
    container_name: postgres-prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-temporal}
      POSTGRES_USER: ${POSTGRES_USER:-temporal}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST_AUTH_METHOD: ${POSTGRES_HOST_AUTH_METHOD:-md5}
    volumes:
      # Persistent data storage
      - postgres-data:/var/lib/postgresql/data
      # Database initialization scripts
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      # Backup script
      - ./docker/postgres/backup.sh:/usr/local/bin/backup.sh:ro
      # Backup storage
      - postgres-backups:/var/backups/postgres
    # Database only accessible internally - no external ports
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 16G
        reservations:
          cpus: '1'
          memory: 8G
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-temporal} -d ${POSTGRES_DB:-temporal}']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - postgres
          - database

  temporal:
    image: temporalio/auto-setup:1.20.0
    container_name: temporal-prod
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-temporal}
      - POSTGRES_PWD=${POSTGRES_PASSWORD}
      - POSTGRES_SEEDS=postgresql
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      - SKIP_SCHEMA_SETUP=false
      - SKIP_DB_CREATE=false
    volumes:
      # Custom Temporal configuration
      - ./docker/temporal/config.yml:/etc/temporal/config/config.yml:ro
      - ./docker/temporal/dynamicconfig:/etc/temporal/dynamicconfig:ro
      # Archival storage
      - temporal-archival:/tmp/temporal_archival
      - temporal-vis-archival:/tmp/temporal_vis_archival
    # Temporal server only accessible internally - no external ports
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
    healthcheck:
      test: ['CMD', 'tctl', '--address', 'temporal:7233', 'cluster', 'health']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - temporal-server

  temporal-ui:
    image: temporalio/ui:2.18.2
    container_name: temporal-ui-prod
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3030
      - TEMPORAL_AUTH_ENABLED=false
    # UI accessible only via internal network (NGINX will proxy it)
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - temporal-web

  app:
    image: ${DOCKER_IMAGE:-ghcr.io/niktverd/instagram-video-downloader:latest}
    container_name: instagram-app-prod
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=${API_PORT:-8080}
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - HEALTH_CHECK_PORT=${HEALTH_CHECK_PORT:-8080}
      - METRICS_ENABLED=${METRICS_ENABLED:-true}
      - METRICS_PORT=${METRICS_PORT:-9090}
    volumes:
      # Application logs
      - app-logs:/app/logs
      # Downloaded content storage
      - app-downloads:/app/downloads
    # App only accessible via NGINX proxy - no external ports
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 4G
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:8080/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - app-server
          - api

  downloading-worker:
    image: ${DOCKER_IMAGE:-ghcr.io/niktverd/instagram-video-downloader:latest}
    container_name: downloading-worker-prod
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - WORKER_TYPE=downloading
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - DOWNLOADING_WORKER_CONCURRENCY=${DOWNLOADING_WORKER_CONCURRENCY:-15}
      - DOWNLOADING_WORKER_MAX_WORKFLOWS=${DOWNLOADING_WORKER_MAX_WORKFLOWS:-25}
      - DOWNLOADING_WORKER_TASK_QUEUE=${DOWNLOADING_WORKER_TASK_QUEUE:-video-downloading}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - DOWNLOAD_VIDEO_START_TO_CLOSE_TIMEOUT=${DOWNLOAD_VIDEO_START_TO_CLOSE_TIMEOUT:-PT7M}
      - DOWNLOAD_VIDEO_MAXIMUM_ATTEMPTS=${DOWNLOAD_VIDEO_MAXIMUM_ATTEMPTS:-3}
      - GET_ACCOUNTS_START_TO_CLOSE_TIMEOUT=${GET_ACCOUNTS_START_TO_CLOSE_TIMEOUT:-PT5M}
      - INSTAGRAM_ACTIVITY_START_TO_CLOSE_TIMEOUT=${INSTAGRAM_ACTIVITY_START_TO_CLOSE_TIMEOUT:-PT10M}
      - WORKER_SHUTDOWN_TIMEOUT=${WORKER_SHUTDOWN_TIMEOUT:-30000}
    volumes:
      # Worker logs
      - downloading-worker-logs:/app/logs
      # Shared downloads storage
      - app-downloads:/app/downloads
      # Temporary processing space
      - downloading-worker-temp:/tmp
    command: ['node', 'dist/scripts/start-downloading-worker.js']
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 32G
        reservations:
          cpus: '2'
          memory: 16G
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'const http = require("http"); const req = http.request({hostname: "localhost", port: 8080, path: "/health", timeout: 5000}, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on("error", () => process.exit(1)); req.end();',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - downloading-worker

  processing-worker:
    image: ${DOCKER_IMAGE:-ghcr.io/niktverd/instagram-video-downloader:latest}
    container_name: processing-worker-prod
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - WORKER_TYPE=processing
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - PROCESSING_WORKER_CONCURRENCY=${PROCESSING_WORKER_CONCURRENCY:-5}
      - PROCESSING_WORKER_MAX_WORKFLOWS=${PROCESSING_WORKER_MAX_WORKFLOWS:-10}
      - PROCESSING_WORKER_TASK_QUEUE=${PROCESSING_WORKER_TASK_QUEUE:-video-processing}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - PROCESS_VIDEO_START_TO_CLOSE_TIMEOUT=${PROCESS_VIDEO_START_TO_CLOSE_TIMEOUT:-PT18M}
      - PROCESS_VIDEO_MAXIMUM_ATTEMPTS=${PROCESS_VIDEO_MAXIMUM_ATTEMPTS:-2}
      - PROCESS_WORKER_MEMORY_LIMIT=${PROCESS_WORKER_MEMORY_LIMIT:-2G}
      - PROCESS_WORKER_CONCURRENCY_LIMIT=${PROCESS_WORKER_CONCURRENCY_LIMIT:-2}
      - WORKER_SHUTDOWN_TIMEOUT=${WORKER_SHUTDOWN_TIMEOUT:-30000}
    volumes:
      # Worker logs
      - processing-worker-logs:/app/logs
      # Shared downloads storage
      - app-downloads:/app/downloads
      # Large temporary processing space for video operations
      - processing-worker-temp:/tmp
      - processing-worker-cache:/app/cache
    command: ['node', 'dist/scripts/start-processing-worker.js']
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 32G
        reservations:
          cpus: '2'
          memory: 16G
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          'const http = require("http"); const req = http.request({hostname: "localhost", port: 8080, path: "/health", timeout: 5000}, (res) => { process.exit(res.statusCode === 200 ? 0 : 1); }); req.on("error", () => process.exit(1)); req.end();',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - processing-worker

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-prod
    depends_on:
      - app
      - temporal-ui
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=80
    volumes:
      # NGINX configuration
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Basic authentication file
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # SSL certificates (Let's Encrypt)
      - letsencrypt-certs:/etc/letsencrypt:ro
      # Certbot webroot for ACME challenge
      - certbot-webroot:/var/www/certbot:ro
      # NGINX logs
      - nginx-logs:/var/log/nginx
    ports:
      # Only expose HTTP and HTTPS ports externally
      - '80:80'
      - '443:443'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - nginx-proxy
          - gateway

  certbot:
    image: certbot/certbot:v2.7.4
    container_name: certbot-prod
    volumes:
      # SSL certificates storage
      - letsencrypt-certs:/etc/letsencrypt
      # Webroot for ACME challenge
      - certbot-webroot:/var/www/certbot
      # Certbot logs
      - certbot-logs:/var/log/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@${NGINX_HOST:-localhost} --agree-tos --no-eff-email -d ${NGINX_HOST:-localhost}
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          cpus: '0.1'
          memory: 128M
    restart: 'no'
    networks:
      temporal-prod-network:
        aliases:
          - certbot

networks:
  temporal-prod-network:
    driver: bridge
    name: temporal-prod-network

volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  temporal-archival:
    driver: local
  temporal-vis-archival:
    driver: local
  app-logs:
    driver: local
  app-downloads:
    driver: local
  downloading-worker-logs:
    driver: local
  downloading-worker-temp:
    driver: local
  processing-worker-logs:
    driver: local
  processing-worker-temp:
    driver: local
  processing-worker-cache:
    driver: local
  nginx-logs:
    driver: local
  letsencrypt-certs:
    driver: local
  certbot-webroot:
    driver: local
  certbot-logs:
    driver: local
