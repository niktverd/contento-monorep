  publishing-init-worker:
    image: ${DOCKER_IMAGE:-ghcr.io/niktverd/instagram-video-downloader:latest}
    container_name: publishing-init-worker-prod
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy

    environment:
      - NODE_ENV=production
      - APP_ENV=server-production
      - WORKER_TYPE=publishing-init
      - APP_DATABASE_URL=${APP_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - PUBLISHING_WORKER_CONCURRENCY=${PUBLISHING_WORKER_CONCURRENCY:-1}
      - PUBLISHING_WORKER_MAX_WORKFLOWS=${PUBLISHING_WORKER_MAX_WORKFLOWS:-1}
      - PUBLISHING_WORKER_TASK_QUEUE=${PUBLISHING_WORKER_TASK_QUEUE:-init-video-publishing}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - WORKER_SHUTDOWN_TIMEOUT=${WORKER_SHUTDOWN_TIMEOUT:-30000}
      - MAIN_BACKEND_ENDPOINT=${MAIN_BACKEND_ENDPOINT:-http://app-server:8080}
      - FIREBASE_CONFIG=${FIREBASE_CONFIG}
      - FIREBASE_ADMIN_SA_CONFIG=${FIREBASE_ADMIN_SA_CONFIG}
      - SUPER_ADMIN_SECRET=${SUPER_ADMIN_SECRET}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - APP_ID=${APP_ID}
      - API_SECRET=${API_SECRET}
    volumes:
      - publishing-worker-logs:/app/logs
      - app-downloads:/app/downloads
      - publishing-worker-temp:/tmp

    command: ['node', 'dist/src/scripts/start-publishing-init-worker.js']
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'dist/src/scripts/start-publishing-init-worker.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - publishing-init-worker

  publishing-exec-worker:
    image: ${DOCKER_IMAGE:-ghcr.io/niktverd/instagram-video-downloader:latest}
    container_name: publishing-exec-worker-prod
    depends_on:
      postgresql:
        condition: service_healthy
      temporal:
        condition: service_healthy

    environment:
      - NODE_ENV=production
      - APP_ENV=server-production
      - WORKER_TYPE=publishing-exec
      - APP_DATABASE_URL=${APP_DATABASE_URL}
      - DATABASE_URL=${DATABASE_URL}
      - TEMPORAL_ADDRESS=${TEMPORAL_ADDRESS:-temporal:7233}
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - PUBLISHING_WORKER_CONCURRENCY=${PUBLISHING_EXEC_WORKER_CONCURRENCY:-10}
      - PUBLISHING_WORKER_MAX_WORKFLOWS=${PUBLISHING_EXEC_WORKER_MAX_WORKFLOWS:-10}
      - PUBLISHING_WORKER_TASK_QUEUE=${PUBLISHING_EXEC_WORKER_TASK_QUEUE:-process-video-publishing}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - WORKER_SHUTDOWN_TIMEOUT=${WORKER_SHUTDOWN_TIMEOUT:-30000}
      - MAIN_BACKEND_ENDPOINT=${MAIN_BACKEND_ENDPOINT:-http://app-server:8080}
      - FIREBASE_CONFIG=${FIREBASE_CONFIG}
      - FIREBASE_ADMIN_SA_CONFIG=${FIREBASE_ADMIN_SA_CONFIG}
      - SUPER_ADMIN_SECRET=${SUPER_ADMIN_SECRET}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS}
      - APP_ID=${APP_ID}
      - API_SECRET=${API_SECRET}
    volumes:
      - publishing-exec-worker-logs:/app/logs
      - app-downloads:/app/downloads
      - publishing-exec-worker-temp:/tmp

    command: ['node', 'dist/src/scripts/start-publishing-exec-worker.js']
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 2G
    healthcheck:
      test: ['CMD', 'pgrep', '-f', 'dist/src/scripts/start-publishing-exec-worker.js']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - publishing-exec-worker

  nginx:
    image: nginx:1.25-alpine
    container_name: nginx-prod
    depends_on:
      - app
      - temporal-ui
    environment:
      - NGINX_HOST=${NGINX_HOST:-localhost}
      - NGINX_PORT=80
    volumes:
      # NGINX configuration
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Basic authentication file
      - ./docker/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # SSL certificates (Let's Encrypt)
      - letsencrypt-certs:/etc/letsencrypt:ro
      # Certbot webroot for ACME challenge
      - certbot-webroot:/var/www/certbot
      # NGINX logs
      - nginx-logs:/var/log/nginx
    ports:
      # Only expose HTTP and HTTPS ports externally
      - '80:80'
      - '443:443'
    deploy:
      resources:
        limits:
          # cpus: '0.5'
          memory: 512M
        reservations:
          # cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:80/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    networks:
      temporal-prod-network:
        aliases:
          - nginx-proxy
          - gateway

  certbot:
    image: certbot/certbot:v2.7.4
    container_name: certbot-prod
    volumes:
      # SSL certificates storage
      - letsencrypt-certs:/etc/letsencrypt
      # Webroot for ACME challenge
      - certbot-webroot:/var/www/certbot
      # Certbot logs
      - certbot-logs:/var/log/letsencrypt
    command: certonly --webroot --webroot-path=/var/www/certbot --email admin@${NGINX_HOST:-localhost} --agree-tos --no-eff-email -d ${NGINX_HOST:-localhost}
    depends_on:
      - nginx
    deploy:
      resources:
        limits:
          # cpus: '0.1'
          memory: 128M
    restart: 'no'
    networks:
      temporal-prod-network:
        aliases:
          - certbot

networks:
  temporal-prod-network:
    driver: bridge
    name: temporal-prod-network

volumes:
  postgres-data:
    driver: local
  postgres-backups:
    driver: local
  temporal-archival:
    driver: local
  temporal-vis-archival:
    driver: local
  app-logs:
    driver: local
  app-downloads:
    driver: local
  downloading-worker-logs:
    driver: local
  downloading-worker-temp:
    driver: local
  processing-worker-logs:
    driver: local
  processing-worker-temp:
    driver: local
  processing-worker-cache:
    driver: local
  publishing-worker-logs:
    driver: local
  publishing-worker-temp:
    driver: local
  nginx-logs:
    driver: local
  letsencrypt-certs:
    driver: local
  certbot-webroot:
    driver: local
  certbot-logs:
    driver: local
  publishing-exec-worker-logs:
    driver: local
  publishing-exec-worker-temp:
    driver: local
